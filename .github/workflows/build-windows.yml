name: Build Windows Installer

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyside6 piexif folium matplotlib numpy natsort requests pillow

      - name: Convert PNG icon to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('icons/Yearbirder_Icon_1024.png').convert('RGBA')
          img.save('icons/Yearbirder.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('ICO created successfully')
          "

      - name: Build with PyInstaller
        run: pyinstaller yearbirder_windows.spec

      - name: Extract version
        id: version
        run: |
          $version = python -c "import re; content = open('src/code_MainWindow.py').read(); print(re.search(r'versionNumber = \`"(.+?)\`"', content).group(1))"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc /DMyAppVersion="${{ steps.version.outputs.version }}" yearbirder.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Yearbirder-Windows-Setup
          path: dist/Yearbirder_Setup.exe
          retention-days: 30

      - name: Attach installer to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          $exists = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/Yearbirder_Setup.exe --clobber
            Write-Host "Uploaded Yearbirder_Setup.exe to release $tag"
          } else {
            Write-Host "No release found for $tag — skipping upload"
          }
