name: Build Windows EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyside6 piexif folium matplotlib numpy natsort requests pillow

      - name: Convert PNG icon to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('icons/Yearbirder_Icon_1024.png').convert('RGBA')
          img.save('icons/Yearbirder.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('ICO created successfully')
          "

      - name: Build with PyInstaller
        run: pyinstaller yearbirder_windows.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Yearbirder-Windows
          path: dist/Yearbirder/
          retention-days: 30
